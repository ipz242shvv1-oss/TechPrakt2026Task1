<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker</title>
</head>

<body>
  <h1>Task Tracker</h1>
  <div>
    <input type="text" id="newTaskInput" placeholder="Нове завдання">
    <button id="addBtn">Додати</button>
  </div>
  <ul id="taskList"></ul>

  <!-- Модальне вікно -->
  <dialog id="editModal">
    <h3>Редагувати завдання</h3>
    <input type="text" id="editTaskInput">
    <br><br>
    <button id="saveEditBtn">Зберегти</button>
    <button id="cancelEditBtn">Скасувати</button>
  </dialog>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
